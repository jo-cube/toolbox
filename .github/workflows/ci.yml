name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install RocksDB headers
        run: |
          sudo apt-get update
          sudo apt-get install -y librocksdb-dev

      - name: Check formatting and shell syntax
        run: |
          files="$(gofmt -l .)"
          test -z "$files" || { printf 'Run gofmt on:\n%s\n' "$files"; exit 1; }
          sh -n scripts/install.sh scripts/smoke-local.sh
          find scripts/release-test -type f -name '*.sh' -exec sh -n {} \;

      - name: Test
        run: make test

      - name: Build
        run: make build VERSION=${GITHUB_SHA}

      - name: Smoke test local binaries
        run: TOOLBOX_BIN="$PWD/bin" sh scripts/smoke-local.sh

  purego-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - cli: hello
            goos: linux
            goarch: amd64
          - cli: hello
            goos: linux
            goarch: arm64
          - cli: hello
            goos: darwin
            goarch: arm64
          - cli: ksetoff
            goos: linux
            goarch: amd64
          - cli: ksetoff
            goos: linux
            goarch: arm64
          - cli: ksetoff
            goos: darwin
            goarch: arm64
          - cli: hll
            goos: linux
            goarch: amd64
          - cli: hll
            goos: linux
            goarch: arm64
          - cli: hll
            goos: darwin
            goarch: arm64
          - cli: bf
            goos: linux
            goarch: amd64
          - cli: bf
            goos: linux
            goarch: arm64
          - cli: bf
            goos: darwin
            goarch: arm64
          - cli: card
            goos: linux
            goarch: amd64
          - cli: card
            goos: linux
            goarch: arm64
          - cli: card
            goos: darwin
            goarch: arm64
          - cli: heavy
            goos: linux
            goarch: amd64
          - cli: heavy
            goos: linux
            goarch: arm64
          - cli: heavy
            goos: darwin
            goarch: arm64
          - cli: sample
            goos: linux
            goarch: amd64
          - cli: sample
            goos: linux
            goarch: arm64
          - cli: sample
            goos: darwin
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Cross-build ${{ matrix.cli }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -ldflags "-s -w -X github.com/jo-cube/toolbox/internal/buildinfo.version=${GITHUB_SHA}" -o dist/${{ matrix.cli }}_${GOOS}_${GOARCH} ./cmd/${{ matrix.cli }}

  rdbsh-build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            goos: linux
            goarch: amd64
          - runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - runner: macos-14
            goos: darwin
            goarch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install RocksDB on Linux
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y librocksdb-dev

      - name: Install RocksDB on macOS
        if: matrix.goos == 'darwin'
        run: brew install rocksdb

      - name: Build rdbsh
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -ldflags "-s -w -X github.com/jo-cube/toolbox/internal/buildinfo.version=${GITHUB_SHA}" -o dist/rdbsh_${GOOS}_${GOARCH} ./cmd/rdbsh
